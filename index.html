<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>거버넌스 포털 — AI 커뮤니티 허브</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
  <!-- 테마 FOUC 방지 (DOMContentLoaded 전에 실행) -->
  <script>
    (function() {
      const t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <span class="site-title">거버넌스 포털</span>
      <nav>
        <a href="communication-guide.html">소통 가이드</a>
        <a href="vault.html">대통령 Vault</a>
        <a href="submit.html">프로젝트 제출</a>
      </nav>
      <div style="display:flex;gap:8px">
        <button id="lang-toggle" aria-label="언어 전환">KO</button>
        <button id="theme-toggle" aria-label="테마 전환">🌙</button>
      </div>
    </div>
  </header>

  <!-- 탭 네비게이션 -->
  <nav class="tab-nav" role="tablist">
    <button class="tab-btn is-active" role="tab" data-tab="news">📰 뉴스</button>
    <button class="tab-btn" role="tab" data-tab="showcase">🛠 쇼케이스</button>
    <button class="tab-btn" role="tab" data-tab="map">🗺 지도</button>
    <button class="tab-btn" role="tab" data-tab="community">💬 커뮤니티</button>
    <button class="tab-btn" role="tab" data-tab="tasks">📋 업무</button>
  </nav>

  <!-- 검색창 -->
  <div class="search-wrap">
    <input id="search-input" type="search" placeholder="프로젝트·뉴스 검색…" aria-label="검색">
  </div>

  <!-- 탭: 뉴스 -->
  <div class="tab-panel is-active" id="tab-news" role="tabpanel">
    <div class="card-grid" id="news-grid"></div>
  </div>

  <!-- 탭: 쇼케이스 -->
  <div class="tab-panel" id="tab-showcase" role="tabpanel">
    <div class="card-grid" id="showcase-grid"></div>
  </div>

  <!-- 탭: 지도 -->
  <div class="tab-panel" id="tab-map" role="tabpanel">
    <nav class="era-timeline" id="timeline" aria-label="시대 타임라인"></nav>
    <main class="portal-layout">
      <section class="map-area" aria-label="문명 지도">
        <svg id="map" width="100%" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg"></svg>
      </section>
      <aside class="info-panel" id="panel" aria-label="도시 정보"></aside>
    </main>
    <section class="mobile-cards" id="cards" aria-label="도시 목록"></section>
  </div>

  <!-- 탭: 커뮤니티 -->
  <div class="tab-panel" id="tab-community" role="tabpanel">
    <div class="community-layout">
      <div class="sub-tab-nav">
        <button class="sub-tab-btn is-active" data-subtab="general">전체 토론</button>
        <button class="sub-tab-btn" data-subtab="cities">도시별</button>
      </div>
      <div id="subtab-general" class="sub-tab-panel">
        <script src="https://giscus.app/client.js"
          data-repo="goropak/governance-dashboard"
          data-repo-id="R_kgDOSqIDDw"
          data-category="General"
          data-category-id="DIC_kwDOSqIDD84DAH8g"
          data-mapping="specific"
          data-term="community-general"
          data-reactions-enabled="1"
          data-emit-metadata="0"
          data-input-position="top"
          data-theme="dark"
          data-lang="ko"
          crossorigin="anonymous"
          async>
        </script>
      </div>
      <div id="subtab-cities" class="sub-tab-panel" hidden>
        <p style="margin-bottom:1rem;color:var(--c-text-muted)">도시를 선택하면 해당 도시의 게시판으로 이동합니다.</p>
        <div style="display:flex;gap:8px;align-items:center">
          <select id="city-select" class="city-select">
            <option value="">— 도시 선택 —</option>
            <option value="cities/governance-dashboard.html">거버넌스 대시보드</option>
            <option value="cities/simsteel.html">SimSteel</option>
            <option value="cities/quanttrader.html">퀀트 트레이더</option>
            <option value="cities/health-assistant.html">헬스 어시스턴트</option>
            <option value="cities/telegram-gate.html">텔레그램 게이트</option>
            <option value="cities/boot-pack.html">Boot Pack</option>
            <option value="cities/orchestrator.html">오케스트레이터</option>
            <option value="cities/steel-attache.html">철강 주재원</option>
            <option value="cities/demo-city.html">데모 시티</option>
          </select>
          <button class="btn-go" onclick="const v=document.getElementById('city-select').value; if(v) location.href=v;">게시판 열기 →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 탭: 업무 -->
  <div class="tab-panel" id="tab-tasks" role="tabpanel">
    <div class="tasks-layout">
      <h3 class="tasks-heading">⏳ 승인 대기</h3>
      <div id="tasks-pending"></div>
      <h3 class="tasks-heading">최근 처리</h3>
      <div id="tasks-done"></div>
    </div>
  </div>

  <footer class="site-footer">
    <p>거버넌스 국가 — 시대를 기록하다</p>
  </footer>

  <!-- ES Module 로딩 -->
  <script type="module">
    import { initTheme } from './js/theme.js';
    import { loadNews, rerenderNews } from './js/news.js';
    import { loadProjects } from './js/cards-v3.js';
    import { initLang, toggleLang } from './js/lang.js';
    import { initCommunity } from './js/community.js';
    import { loadTasks } from './js/tasks.js';

    initTheme();
    initLang();
    initCommunity();

    document.getElementById('lang-toggle').addEventListener('click', () => {
      toggleLang(rerenderNews);
    });

    // 탭 전환
    const tabs = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.tab-panel');
    let mapLoaded = false;
    let tasksLoaded = false;

    tabs.forEach(btn => {
      btn.addEventListener('click', () => {
        tabs.forEach(b => b.classList.remove('is-active'));
        panels.forEach(p => p.classList.remove('is-active'));
        btn.classList.add('is-active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('is-active');

        if (btn.dataset.tab === 'tasks' && !tasksLoaded) {
          tasksLoaded = true;
          loadTasks(document.getElementById('tasks-pending'), document.getElementById('tasks-done'));
        }

        if (btn.dataset.tab === 'map' && !mapLoaded) {
          mapLoaded = true;
          import('./js/data.js');
          import('./js/timeline.js');
          import('./js/map.js');
          import('./js/panel.js');
          import('./js/cards.js');
        }
      });
    });

    // 뉴스·쇼케이스 즉시 로딩
    loadNews(document.getElementById('news-grid'));
    loadProjects(document.getElementById('showcase-grid'));

    // 검색 (카드 title/desc 필터)
    document.getElementById('search-input').addEventListener('input', e => {
      const q = e.target.value.toLowerCase();
      document.querySelectorAll('.card').forEach(card => {
        const text = card.textContent.toLowerCase();
        card.style.display = q === '' || text.includes(q) ? '' : 'none';
      });
    });
  </script>
</body>
</html>
